name: Synchronisation donnees Superviseurs KoboToolbox

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch KoboToolbox data
        env:
          KOBO_TOKEN: ${{ secrets.KOBO_TOKEN }}
          FORM_UID: aGFaz86f9uVHSr4LX37haY
        run: python fetch_data.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes" || (git commit -m "Sync superviseurs data [skip ci]" && git push)
